model_key: deepseek_v4_pro_review
provider: deepseek
enabled: true
api_style: openai_chat_completion
model_name: deepseek-v4-pro
model_version: v4_pro
profile_version: profile_v1
docs_checked_at: "2026-05-20T00:00:00Z"
docs_source:
  - "DeepSeek official API docs: https://api-docs.deepseek.com/api/list-models"
  - "DeepSeek official API docs: https://api-docs.deepseek.com/guides/thinking_mode"
  - "DeepSeek official API docs: https://api-docs.deepseek.com/api/create-chat-completion"
model_role: mathematical_structure_review
analysis_mode: single
prompt_template_version: review_gate_v1
review_schema_version: review_schema_v1

capabilities:
  json_output: true
  reasoning_content: true
  thinking: true
  function_calling: false
  streaming: false

request_params:
  max_tokens: 4096
  response_format:
    type: json_object
  reasoning_effort: high
  extra_body:
    thinking:
      type: enabled

ignored_params_in_thinking_mode:
  - temperature
  - top_p
  - presence_penalty
  - frequency_penalty

response_mapping:
  final_content_path: choices.0.message.content
  reasoning_content_path: choices.0.message.reasoning_content
  usage_path: usage
  finish_reason_path: choices.0.finish_reason
  provider_request_id_path: id

unsupported_params:
  - tools
  - function_call

cost_policy:
  track_token_usage: true
  require_cost_confirmation: true
  currency: USD
  input_token_price: 2.0
  output_token_price: 8.0
